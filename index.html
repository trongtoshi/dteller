<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D TELLER | Car Hub & Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .bento-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bento-item:active { transform: scale(0.96); }
        .animate-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .receipt-cutout { position: relative; }
        .receipt-cutout::before, .receipt-cutout::after {
            content: ''; position: absolute; top: 50%; width: 24px; height: 24px; 
            background-color: #f8fafc; border-radius: 50%; transform: translateY(-50%);
        }
        .receipt-cutout::before { left: -12px; }
        .receipt-cutout::after { right: -12px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, query, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { 
            initializeApp, getFirestore, doc, setDoc, collection, onSnapshot, query, addDoc, deleteDoc, updateDoc, getAuth, signInAnonymously, onAuthStateChanged
        };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = ''; 
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    i.style.width = size + 'px';
                    i.style.height = size + 'px';
                    containerRef.current.appendChild(i);
                    window.lucide.createIcons({ root: containerRef.current }); 
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [data, setData] = useState(null);
            const [view, setView] = useState('home'); 
            const [calc, setCalc] = useState({ size: 'small', item: 'tint_car', code: '', area: 1 });
            const [discount, setDiscount] = useState(0);
            
            const [db, setDb] = useState(null);
            const [availability, setAvailability] = useState({});
            const [bookings, setBookings] = useState([]);
            
            // TRẠNG THÁI BỘ LỌC TÌM KIẾM & LỊCH XUYÊN THỜI GIAN
            const [searchTerm, setSearchTerm] = useState('');
            const [filterPeriod, setFilterPeriod] = useState('all'); 
            const [navDate, setNavDate] = useState(new Date()); // Biến điều hướng tháng cho Lịch
            
            const [selectedDate, setSelectedDate] = useState(null);
            const [bookingForm, setBookingForm] = useState({ name: '', phone: '', time: '09:00' });
            const [recentBooking, setRecentBooking] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isPromoApplied, setIsPromoApplied] = useState(false);
            const [globalError, setGlobalError] = useState(null);

            // TRẠNG THÁI MODAL CHỈNH SỬA ĐƠN HÀNG
            const [editModal, setEditModal] = useState(null);

            useEffect(() => {
                const loadSystem = async () => {
                    try {
                        const res = await fetch(`data.json?t=${Date.now()}`);
                        if (!res.ok) throw new Error("Không tìm thấy file data.json trên máy chủ.");
                        const text = await res.text();
                        let json = JSON.parse(text);
                        setData(json);

                        const fbConfig = json.firebaseConfig;
                        if (fbConfig && fbConfig.apiKey && fbConfig.apiKey.length > 10 && fbConfig.apiKey !== "ĐIỀN_API_KEY_CỦA_ÔNG_VÀO_ĐÂY" && window.FirebaseSDK) {
                            try {
                                const { initializeApp, getFirestore, getAuth, signInAnonymously } = window.FirebaseSDK;
                                const app = window._firebaseApp || initializeApp(fbConfig);
                                window._firebaseApp = app;
                                const firestore = getFirestore(app);
                                const auth = getAuth(app);
                                setDb(firestore);
                                await signInAnonymously(auth);
                            } catch(err) { console.error("Lỗi khởi tạo Firebase:", err); }
                        }
                    } catch (e) { setGlobalError(e.message); }
                };
                loadSystem();
            }, []);

            useEffect(() => {
                if (!db) return;
                const { collection, onSnapshot, query } = window.FirebaseSDK;
                try {
                    const unsubAvail = onSnapshot(query(collection(db, 'availability')), (snapshot) => {
                        const dict = {};
                        snapshot.forEach(doc => dict[doc.id] = doc.data());
                        setAvailability(dict);
                    });

                    const unsubBook = onSnapshot(query(collection(db, 'bookings')), (snapshot) => {
                        const list = [];
                        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        setBookings(list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                    });

                    return () => { unsubAvail(); unsubBook(); };
                } catch(e) { console.warn("Lỗi đọc Database:", e); }
            }, [db]);

            const filteredBookings = useMemo(() => {
                let result = bookings;
                if (searchTerm.trim() !== '') {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(b => (b.name && b.name.toLowerCase().includes(term)) || (b.phone && b.phone.includes(term)));
                }
                const now = new Date();
                now.setHours(0, 0, 0, 0);

                if (filterPeriod === 'week') {
                    const day = now.getDay() || 7;
                    const start = new Date(now); start.setDate(now.getDate() - (day - 1));
                    const end = new Date(start); end.setDate(end.getDate() + 6); end.setHours(23, 59, 59, 999);
                    result = result.filter(b => { if (!b.date) return false; const d = new Date(b.date); return d >= start && d <= end; });
                } else if (filterPeriod === 'month') {
                    const start = new Date(now.getFullYear(), now.getMonth(), 1);
                    const end = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
                    result = result.filter(b => { if (!b.date) return false; const d = new Date(b.date); return d >= start && d <= end; });
                } else if (filterPeriod === 'last_month') {
                    const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                    const end = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999);
                    result = result.filter(b => { if (!b.date) return false; const d = new Date(b.date); return d >= start && d <= end; });
                }
                return result;
            }, [bookings, searchTerm, filterPeriod]);

            const selectedItem = useMemo(() => data?.pricing.items.find(i => i.id === calc.item), [calc.item, data]);
            const finalPrice = useMemo(() => {
                if (!selectedItem || !data) return 0;
                let p = selectedItem.type === 'car' ? selectedItem.base * (data.pricing.carSizes.find(i => i.id === calc.size)?.m || 1) : selectedItem.base * (parseFloat(calc.area) || 0);
                return discount > 0 ? p * (1 - discount) : p;
            }, [calc, selectedItem, discount, data]);
            const formatVND = (val) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(val);

            const stats = useMemo(() => {
                let totalRev = 0; let totalComm = 0; const serviceMap = {};
                filteredBookings.forEach(b => {
                    const rp = b.rawPrice !== undefined ? b.rawPrice : Number((b.price || '0').replace(/[^\d]/g, ''));
                    const comm = Number(b.commission || 0);
                    totalRev += rp; totalComm += comm;
                    if (!serviceMap[b.service]) serviceMap[b.service] = { count: 0, revenue: 0 };
                    serviceMap[b.service].count += 1; serviceMap[b.service].revenue += rp;
                });
                const sortedServices = Object.keys(serviceMap).map(key => ({ name: key, ...serviceMap[key] })).sort((a, b) => b.count - a.count);
                return { totalRev, totalComm, sortedServices };
            }, [filteredBookings]);

            // KIỂM TRA MÃ GIẢM GIÁ (HỖ TRỢ MÃ 1 LẦN)
            const applyPromo = () => {
                const code = calc.code.toUpperCase().trim();
                const promoData = data?.pricing.promos[code];
                if (promoData !== undefined) { 
                    if (typeof promoData === 'number') {
                        setDiscount(promoData); 
                        setIsPromoApplied(true);
                    } else if (promoData.value) {
                        setDiscount(promoData.value);
                        setIsPromoApplied(true);
                    }
                } 
                else { setDiscount(0); setIsPromoApplied(false); }
            };

            const sendTelegramNotification = async (bookingData) => {
                if (!data.telegramConfig || !data.telegramConfig.active || !data.telegramConfig.botToken) return;
                const message = `🚨 *CÓ KHÁCH ĐẶT LỊCH MỚI* 🚨\n\n👤 *Khách hàng:* ${bookingData.name}\n📞 *SĐT:* ${bookingData.phone}\n📅 *Ngày hẹn:* ${bookingData.date}\n⏰ *Giờ:* ${bookingData.time}\n🛠 *Dịch vụ:* ${bookingData.service}\n🏷 *Mã Ưu Đãi:* ${bookingData.promo || 'Không'}\n💰 *Dự toán:* ${bookingData.price}\n\n👉 Mở web để xem: https://dtellers.netlify.app`;
                const url = `https://api.telegram.org/bot${data.telegramConfig.botToken}/sendMessage`;
                try {
                    await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: data.telegramConfig.chatId, text: message, parse_mode: 'Markdown' }) });
                } catch (error) { console.error("Lỗi gửi thông báo Telegram", error); }
            };

            const submitBooking = async (e) => {
                e.preventDefault();
                if (!db) { alert("⚠️ Tính năng đang offline. Cần cấu hình DB."); return; }
                
                const enteredCode = calc.code.toUpperCase().trim();
                const promoData = data?.pricing.promos[enteredCode];

                // KIỂM TRA ĐIỀU KIỆN MÃ 1 LẦN (NẾU CÓ)
                if (promoData && typeof promoData === 'object' && promoData.singleUse) {
                    const isUsed = bookings.some(b => b.phone === bookingForm.phone && b.promo === enteredCode);
                    if (isUsed) {
                        alert("⚠️ Lỗi: Số điện thoại này đã sử dụng mã giảm giá này trước đây!");
                        return;
                    }
                }

                const { collection, addDoc, doc, setDoc } = window.FirebaseSDK;
                try {
                    const bookingData = {
                        ...bookingForm,
                        date: selectedDate,
                        service: selectedItem?.name || 'Tư vấn giải pháp',
                        price: formatVND(finalPrice),
                        rawPrice: finalPrice, 
                        promo: enteredCode, // Lưu mã giảm giá đã xài
                        commission: 0, 
                        createdAt: new Date().toISOString()
                    };
                    await addDoc(collection(db, 'bookings'), bookingData);

                    const currentStatus = availability[selectedDate]?.status || 'empty';
                    const nextStatus = currentStatus === 'empty' ? 'half' : 'full';
                    await setDoc(doc(db, 'availability', selectedDate), { status: nextStatus });

                    sendTelegramNotification(bookingData);

                    setRecentBooking(bookingData);
                    setView('success');
                    setSelectedDate(null);
                    setBookingForm({ name: '', phone: '', time: '09:00' });
                } catch (e) { alert("Lỗi kết nối CSDL."); }
            };

            const toggleDayStatus = async (dateStr) => {
                if (!db) return;
                const current = availability[dateStr]?.status || 'empty';
                const next = current === 'empty' ? 'half' : current === 'half' ? 'full' : 'empty';
                const { doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(db, 'availability', dateStr), { status: next });
            };

            const updateCommission = async (id, value) => {
                if (!db) return;
                const { doc, updateDoc } = window.FirebaseSDK;
                try { await updateDoc(doc(db, 'bookings', id), { commission: Number(value) || 0 }); } catch (e) { console.error("Lỗi cập nhật hoa hồng", e); }
            };

            const deleteBooking = async (id) => {
                if(!confirm("Xác nhận xóa bỏ đơn hàng này khỏi dữ liệu?")) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'bookings', id));
            };

            // HÀM LƯU CHỈNH SỬA ĐƠN HÀNG
            const saveEditBooking = async (e) => {
                e.preventDefault();
                if (!db || !editModal) return;
                const { doc, updateDoc } = window.FirebaseSDK;
                try {
                    // Update the rawPrice if the user changes the text price (basic extraction)
                    let newRaw = editModal.rawPrice;
                    const parsed = Number(String(editModal.price).replace(/[^\d]/g, ''));
                    if (parsed > 0 && parsed !== newRaw) newRaw = parsed;

                    await updateDoc(doc(db, 'bookings', editModal.id), {
                        name: editModal.name,
                        phone: editModal.phone,
                        date: editModal.date,
                        time: editModal.time,
                        service: editModal.service,
                        price: editModal.price,
                        rawPrice: newRaw
                    });
                    setEditModal(null);
                    alert("Cập nhật đơn hàng thành công!");
                } catch (err) { alert("Lỗi khi cập nhật đơn hàng."); }
            };

            if (globalError) return <div className="min-h-screen bg-slate-100 p-8 flex flex-col items-center justify-center text-center"><Icon name="alert-triangle" size={60} className="text-red-500 mb-6 drop-shadow-md" /><h1 className="text-2xl font-black text-slate-800 mb-3">LỖI TẢI DỮ LIỆU</h1><p className="text-red-600 font-bold text-sm">{globalError}</p></div>;
            if (!data) return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-900 text-white font-black animate-pulse uppercase tracking-widest text-xl">Đang tải hệ thống...</div>;

            const renderCalendar = () => {
                const days = [];
                const year = navDate.getFullYear();
                const month = navDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay(); 
                const emptyCells = firstDay === 0 ? 6 : firstDay - 1; 
                const today = new Date();

                const weekDays = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
                const headers = weekDays.map((d, i) => <div key={`head-${i}`} className={`text-center text-[10px] font-black pb-2 ${i >= 5 ? 'text-red-500' : 'text-slate-400'}`}>{d}</div>);

                for (let i = 0; i < emptyCells; i++) days.push(<div key={`empty-${i}`} className="h-14"></div>);

                for (let i = 1; i <= daysInMonth; i++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const st = availability[dStr]?.status || 'empty';
                    const dateObj = new Date(year, month, i);
                    const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                    
                    // Chỉ vô hiệu hóa quá khứ so với "ngày hôm nay", không phải tháng hiện tại
                    const isPast = dateObj < new Date(today.getFullYear(), today.getMonth(), today.getDate());

                    let bgColor = 'bg-white border border-slate-100'; let textColor = isWeekend ? 'text-red-500' : 'text-slate-800'; let subText = 'Trống'; let subColor = 'text-green-500';
                    if (st === 'full') { bgColor = 'bg-red-500 text-white border-transparent'; textColor = 'text-white'; subText = 'Kín'; subColor = 'text-red-100'; } 
                    else if (st === 'half') { bgColor = 'bg-yellow-400 text-slate-900 border-transparent'; textColor = 'text-slate-900'; subText = 'Nửa'; subColor = 'text-yellow-800'; }
                    if (isPast && st === 'empty' && !isAdmin) { bgColor = 'bg-slate-50 opacity-40 cursor-not-allowed'; textColor = 'text-slate-400'; subText = '-'; subColor = 'text-slate-300'; }

                    days.push(
                        <button key={i} type="button" disabled={isPast && !isAdmin && st !== 'full'} onClick={() => { if (isAdmin) toggleDayStatus(dStr); else if (st !== 'full' && !isPast) setSelectedDate(dStr); }} className={`h-14 rounded-xl flex flex-col items-center justify-center shadow-sm transition-all ${bgColor} ${selectedDate === dStr ? 'ring-4 ring-blue-600 scale-105 z-10' : 'active:scale-95'}`}>
                            <span className={`text-sm font-black ${textColor}`}>{i}</span>
                            <span className={`text-[7px] font-bold uppercase mt-1 ${subColor}`}>{subText}</span>
                        </button>
                    );
                }
                return <div className="w-full"><div className="grid grid-cols-7 gap-1 mb-2">{headers}</div><div className="grid grid-cols-7 gap-1">{days}</div></div>;
            };

            return (
                <div className="max-w-md mx-auto min-h-screen px-4 pt-8 pb-32 animate-in relative">
                    
                    <header className="flex flex-col items-center mb-8 text-center">
                        <div className="relative mb-5 group">
                            <div className="absolute inset-0 bg-blue-500 blur-3xl opacity-10 rounded-full"></div>
                            <div className="relative w-24 h-24 rounded-[2.5rem] border-4 border-white shadow-2xl bg-white overflow-hidden flex items-center justify-center p-1">
                                <img src={data.profile.avatar} className="w-full h-full object-cover rounded-[2rem]" onError={(e)=>{e.target.src="https://api.dicebear.com/7.x/initials/svg?seed=DT"}} />
                            </div>
                            <div className="absolute bottom-1 right-1 bg-green-500 w-5 h-5 rounded-full border-4 border-white shadow-sm"></div>
                        </div>
                        <h1 onClick={() => { window._clickCount = (window._clickCount || 0) + 1; if(window._clickCount >= 5) { setIsAdmin(true); setView('admin_dashboard'); window._clickCount = 0; }}} className="text-2xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2 select-none">
                            {data.profile.name} <Icon name="check-circle" size={18} className="text-blue-500 fill-blue-500/10" />
                        </h1>
                        <p className="text-blue-600 font-bold text-[10px] uppercase tracking-[0.2em] mt-1 select-none">
                            {isAdmin ? '🔴 CHẾ ĐỘ QUẢN LÝ (ADMIN)' : data.profile.title}
                        </p>
                    </header>

                    {/* ADMIN MENU TABS */}
                    {isAdmin && (
                        <div className="flex bg-slate-200/60 p-1.5 rounded-[1.2rem] mb-4 backdrop-blur-sm gap-1 shadow-inner">
                            <button onClick={() => setView('admin_calendar')} className={`flex-1 py-3 rounded-xl text-[9px] font-black tracking-widest ${view === 'admin_calendar' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>LỊCH</button>
                            <button onClick={() => setView('admin_dashboard')} className={`flex-1 py-3 rounded-xl text-[9px] font-black tracking-widest ${view === 'admin_dashboard' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>ĐƠN HÀNG</button>
                            <button onClick={() => setView('admin_stats')} className={`flex-1 py-3 rounded-xl text-[9px] font-black tracking-widest ${view === 'admin_stats' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>THỐNG KÊ</button>
                            <button onClick={() => {setIsAdmin(false); setView('home');}} className="px-3 text-red-500"><Icon name="power" size={16}/></button>
                        </div>
                    )}

                    {/* BỘ LỌC TÌM KIẾM (Chỉ hiện trong Quản lý đơn và Thống kê) */}
                    {isAdmin && (view === 'admin_dashboard' || view === 'admin_stats') && (
                        <div className="flex gap-2 mb-6 animate-in">
                            <div className="relative flex-[3]">
                                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="Tìm tên, SĐT..." 
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                    className="w-full bg-white border border-slate-100 rounded-2xl pl-9 pr-3 py-3 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500 shadow-sm placeholder:text-slate-300"
                                />
                            </div>
                            <select 
                                value={filterPeriod}
                                onChange={e => setFilterPeriod(e.target.value)}
                                className="flex-[2] bg-white border border-slate-100 rounded-2xl px-3 py-3 text-[10px] font-black uppercase tracking-wider text-slate-600 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm appearance-none"
                            >
                                <option value="all">Toàn thời gian</option>
                                <option value="week">Lịch Tuần này</option>
                                <option value="month">Lịch Tháng này</option>
                                <option value="last_month">Tháng trước</option>
                            </select>
                        </div>
                    )}

                    {view === 'home' && (
                        <div className="grid grid-cols-2 gap-4 animate-in">
                            <div className="col-span-2 flex justify-center gap-4 mb-4">
                                {data.socials.map(s => {
                                    let iconName = 'link'; if (s.id === 'tiktok') iconName = 'video'; if (s.id === 'fb') iconName = 'facebook'; if (s.id === 'shopping-bag' || s.id === 'shopee') iconName = 'shopping-bag';
                                    return <a key={s.id} href={s.url} target="_blank" className={`${s.color} text-white p-4 rounded-[1.3rem] shadow-xl active:scale-90 transition-all flex items-center justify-center`}><Icon name={iconName} size={22} /></a>;
                                })}
                            </div>

                            <a href={data.hotDeal.link} target="_blank" className="col-span-2 bg-[#1e293b] rounded-[2.5rem] p-8 text-white relative overflow-hidden bento-item shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div><span className="text-[10px] font-black tracking-widest text-blue-400 uppercase">Flash Deal</span></div>
                                    <span className="bg-[#ef4444] text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-wider pulse-red">{data.hotDeal.badge}</span>
                                </div>
                                <h2 className="text-2xl font-extrabold leading-tight mb-6 uppercase">{data.hotDeal.title}</h2>
                                <div className="flex items-center gap-4 mb-8">
                                    <span className="text-4xl font-black">{data.hotDeal.price}</span>
                                    <div className="bg-red-500/20 px-2.5 py-1 rounded-md text-center"><span className="text-xs text-[#ef4444] line-through font-bold">{data.hotDeal.oldPrice}</span></div>
                                </div>
                                <div className="bg-[#facc15] rounded-3xl p-5 flex items-center gap-4 shadow-xl"><div className="bg-[#0f172a] p-2.5 rounded-xl text-[#facc15] flex-shrink-0"><Icon name="gift" size={24} /></div><p className="text-[11px] font-extrabold text-[#0f172a] leading-snug uppercase tracking-tight">{data.hotDeal.gift}</p></div>
                                <Icon name="zap" size={180} className="absolute -right-12 -bottom-12 opacity-[0.03] text-white rotate-12" />
                            </a>

                            <button type="button" onClick={() => setView('calc')} className="col-span-2 rounded-[2.2rem] bg-white p-6 flex items-center justify-between shadow-sm border border-slate-100 bento-item">
                                <div className="flex items-center gap-4">
                                    <div className="bg-blue-50 p-3.5 rounded-2xl text-blue-600"><Icon name="calculator" /></div>
                                    <div className="text-left"><h4 className="text-[15px] font-extrabold text-slate-900">Dự toán chi phí</h4><p className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Có ưu đãi đi kèm</p></div>
                                </div>
                                <Icon name="chevron-right" size={18} className="text-slate-300" />
                            </button>

                            {data.services.map(s => (
                                <a key={s.id} href={s.url} target="_blank" className={`${s.size === 'large' ? 'col-span-2' : 'col-span-1'} bg-white rounded-[2.2rem] p-6 border border-slate-100 shadow-sm flex flex-col justify-between bento-item min-h-[145px]`}>
                                    <div className={`${s.color} w-11 h-11 rounded-2xl flex items-center justify-center text-white mb-6 shadow-lg`}><Icon name={s.icon} size={22} /></div>
                                    <h4 className="text-[13px] font-extrabold leading-tight text-slate-800">{s.title}</h4>
                                </a>
                            ))}
                        </div>
                    )}

                    {/* LỊCH ADMIN / KHÁCH */}
                    {(view === 'booking' || view === 'admin_calendar') && (
                        <div className="animate-in space-y-6">
                            <div className="bg-white rounded-[2.5rem] p-6 shadow-2xl border border-slate-50">
                                
                                {/* ĐIỀU HƯỚNG THÁNG CỦA LỊCH */}
                                <div className="flex justify-between items-center mb-6">
                                    <button 
                                        type="button" 
                                        onClick={() => setNavDate(new Date(navDate.getFullYear(), navDate.getMonth() - 1, 1))}
                                        className="p-2 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors"
                                    >
                                        <Icon name="chevron-left" size={18}/>
                                    </button>
                                    <h3 className="font-black uppercase tracking-[0.1em] text-[11px] text-slate-600">
                                        Tháng {navDate.getMonth() + 1} / {navDate.getFullYear()}
                                    </h3>
                                    <div className="flex gap-2">
                                        <button 
                                            type="button" 
                                            onClick={() => setNavDate(new Date(navDate.getFullYear(), navDate.getMonth() + 1, 1))}
                                            className="p-2 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors"
                                        >
                                            <Icon name="chevron-right" size={18}/>
                                        </button>
                                        <button onClick={() => setView('home')} className="p-2 bg-red-100 text-red-500 rounded-xl ml-2"><Icon name="x" size={16}/></button>
                                    </div>
                                </div>

                                <div className="mb-6">{renderCalendar()}</div>
                                
                                {selectedDate && !isAdmin && (
                                    <form onSubmit={submitBooking} className="space-y-4 pt-8 border-t border-slate-100 animate-in">
                                        <div className="text-center mb-6"><span className="bg-blue-50 text-blue-600 px-4 py-2 rounded-full font-black text-xs uppercase tracking-widest leading-none shadow-sm">NGÀY HẸN: {selectedDate}</span></div>
                                        <input required placeholder="Họ và tên khách hàng" className="w-full bg-slate-50 p-4.5 rounded-2xl text-sm font-bold outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500" value={bookingForm.name} onChange={e => setBookingForm({...bookingForm, name: e.target.value})} />
                                        <input required type="tel" placeholder="Số điện thoại liên hệ" className="w-full bg-slate-50 p-4.5 rounded-2xl text-sm font-bold outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500" value={bookingForm.phone} onChange={e => setBookingForm({...bookingForm, phone: e.target.value})} />
                                        <div className="flex gap-2">
                                            <input type="time" required className="flex-1 bg-slate-50 p-4.5 rounded-2xl text-sm font-bold ring-1 ring-slate-100" value={bookingForm.time} onChange={e => setBookingForm({...bookingForm, time: e.target.value})} />
                                            <button type="submit" className="flex-[2] bg-blue-600 text-white font-black rounded-2xl uppercase text-[10px] tracking-widest shadow-xl shadow-blue-200">Xác nhận lịch</button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {view === 'calc' && (
                        <div className="bg-white rounded-[2.5rem] p-7 shadow-2xl animate-in space-y-6">
                            <div className="flex justify-between items-center mb-2"><h3 className="font-black uppercase tracking-widest text-xs">Dự toán & Ưu đãi</h3><button onClick={() => setView('home')} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={16}/></button></div>
                            <select className="w-full bg-slate-50 p-4.5 rounded-2xl font-bold outline-none ring-1 ring-slate-100" value={calc.item} onChange={e => setCalc({...calc, item: e.target.value})}>
                                {data.pricing.items.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                            </select>
                            {selectedItem?.type === 'car' ? (
                                <div className="grid grid-cols-1 gap-2.5">
                                    {data.pricing.carSizes.map(sz => (
                                        <button key={sz.id} type="button" onClick={() => setCalc({...calc, size: sz.id})} className={`p-4 rounded-2xl text-[11px] font-black border-2 transition-all ${calc.size === sz.id ? 'border-blue-600 bg-blue-50 text-blue-600 shadow-sm' : 'border-transparent bg-slate-50 text-slate-400'}`}>{sz.name}</button>
                                    ))}
                                </div>
                            ) : (
                                <div className="relative"><input type="number" className="w-full bg-slate-50 p-4.5 rounded-2xl text-xl font-black text-center ring-1 ring-slate-100 outline-none" value={calc.area} onChange={e => setCalc({...calc, area: e.target.value})} /><span className="absolute right-6 top-1/2 -translate-y-1/2 font-black text-slate-300 uppercase text-[10px] tracking-widest">{selectedItem?.type === 'house' ? 'm²' : 'Clip'}</span></div>
                            )}

                            <div>
                                <div className="flex gap-2.5">
                                    <input placeholder="MÃ GIẢM GIÁ" className="flex-1 bg-slate-50 rounded-2xl px-5 text-[10px] font-black uppercase outline-none ring-1 ring-slate-100" value={calc.code} onChange={e => { setCalc({...calc, code: e.target.value}); if (discount > 0) setDiscount(0); }} />
                                    <button type="button" onClick={applyPromo} className="bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-black/10 active:scale-95 transition-transform">Dùng</button>
                                </div>
                                {isPromoApplied && <p className="text-green-600 text-[10px] font-black text-center mt-3 uppercase tracking-widest flex items-center justify-center gap-1 animate-in"><Icon name="check" size={12} /> Đã áp dụng (Giảm {discount*100}%)</p>}
                            </div>

                            <div className="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-8 rounded-[2.5rem] text-center shadow-xl shadow-blue-100 relative overflow-hidden">
                                <div className="relative z-10">
                                    <p className="text-[11px] font-black opacity-70 uppercase mb-2 tracking-[0.2em]">Giá dự toán</p>
                                    <h3 className="text-4xl font-black mb-6 leading-tight tracking-tight">{formatVND(finalPrice)}</h3>
                                    <button type="button" onClick={() => setView('booking')} className="w-full bg-white text-blue-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                                        Tiến hành đặt lịch
                                    </button>
                                </div>
                                <Icon name="calculator" size={140} className="absolute -right-8 -bottom-8 opacity-10 rotate-12" />
                            </div>
                        </div>
                    )}

                    {view === 'success' && recentBooking && (
                        <div className="animate-in">
                            <div className="bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden">
                                <div className="bg-green-500 p-8 text-center text-white">
                                    <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm"><Icon name="check" size={32} /></div>
                                    <h2 className="text-2xl font-black tracking-tight mb-1">ĐẶT LỊCH THÀNH CÔNG</h2>
                                    <p className="text-xs opacity-80 uppercase tracking-widest font-bold">Tôi sẽ liên hệ để xác nhận</p>
                                </div>
                                <div className="receipt-cutout border-t-2 border-dashed border-slate-200"></div>
                                <div className="p-8 space-y-6">
                                    <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Khách hàng</p><p className="font-black text-lg text-slate-800">{recentBooking.name}</p></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Ngày hẹn</p><p className="font-black text-slate-800">{recentBooking.date}</p></div>
                                        <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Giờ</p><p className="font-black text-slate-800">{recentBooking.time}</p></div>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-2xl">
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Dịch vụ</p><p className="font-black text-blue-600">{recentBooking.service}</p>
                                        <div className="h-px bg-slate-200 my-3"></div>
                                        <div className="flex justify-between items-center"><span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Dự toán</span><span className="font-black text-lg">{recentBooking.price}</span></div>
                                    </div>
                                    <button onClick={() => setView('home')} className="w-full bg-slate-100 text-slate-600 py-4.5 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Về trang chủ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MÀN HÌNH DANH SÁCH ĐƠN HÀNG */}
                    {view === 'admin_dashboard' && (
                        <div className="animate-in space-y-4 pb-10">
                            <div className="flex justify-between items-center mb-2 px-1">
                                <h3 className="font-black uppercase tracking-[0.2em] text-xs text-slate-400">📦 KẾT QUẢ: {filteredBookings.length} ĐƠN HÀNG</h3>
                            </div>
                            
                            {filteredBookings.map(b => (
                                <div key={b.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden animate-in mb-4 group">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h4 className="text-lg font-black tracking-tight leading-none mb-1 flex items-center gap-2">
                                                {b.name}
                                                {b.promo && <span className="text-[8px] bg-green-100 text-green-600 px-1.5 py-0.5 rounded-full uppercase tracking-widest">{b.promo}</span>}
                                            </h4>
                                            <p className="text-blue-600 font-bold text-xs uppercase tracking-widest">{b.phone}</p>
                                        </div>
                                        <div className="flex gap-1">
                                            {/* NÚT CHỈNH SỬA MỚI THÊM VÀO */}
                                            <button onClick={() => setEditModal(b)} className="p-2 text-slate-400 hover:text-blue-500 bg-slate-50 rounded-xl transition-colors"><Icon name="edit" size={18}/></button>
                                            <button onClick={() => deleteBooking(b.id)} className="p-2 text-slate-400 hover:text-red-500 bg-slate-50 rounded-xl transition-colors"><Icon name="trash-2" size={18}/></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mb-3">
                                        <div className="bg-slate-50 p-3 rounded-2xl"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Thời gian</p><p className="text-[11px] font-bold">{b.date} • {b.time}</p></div>
                                        <div className="bg-slate-50 p-3 rounded-2xl"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Dự toán</p><p className="text-[11px] font-bold text-blue-600">{b.price}</p></div>
                                    </div>
                                    <div className="bg-blue-50 p-3.5 rounded-2xl font-black text-[11px] leading-tight text-blue-900 mb-3">{b.service}</div>
                                    
                                    <div className="flex items-center justify-between bg-emerald-50/50 border border-emerald-100 p-3 rounded-2xl">
                                        <span className="text-[9px] font-black text-emerald-600 uppercase tracking-widest flex items-center gap-1">
                                            <Icon name="dollar-sign" size={12}/> Hoa hồng
                                        </span>
                                        <input 
                                            type="number" 
                                            placeholder="0"
                                            defaultValue={b.commission || ''}
                                            onBlur={(e) => updateCommission(b.id, e.target.value)}
                                            className="bg-white border border-emerald-200 rounded-lg px-3 py-1.5 text-right font-bold text-xs text-emerald-600 w-28 outline-none focus:ring-2 focus:ring-emerald-400"
                                        />
                                    </div>

                                    <div className="absolute top-0 right-0 h-full w-1.5 bg-blue-500"></div>
                                </div>
                            ))}
                            {filteredBookings.length === 0 && <p className="text-center text-slate-400 text-xs font-bold uppercase mt-10">Không tìm thấy đơn hàng nào</p>}
                        </div>
                    )}

                    {/* MODAL CHỈNH SỬA ĐƠN HÀNG NỔI TRÊN MÀN HÌNH */}
                    {editModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
                            <form onSubmit={saveEditBooking} className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl relative overflow-hidden">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black uppercase tracking-[0.1em] text-sm text-slate-800">✏️ CHỈNH SỬA ĐƠN HÀNG</h3>
                                </div>

                                <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase">Tên khách hàng</label><input required className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border border-slate-100 mt-1" value={editModal.name} onChange={e => setEditModal({...editModal, name: e.target.value})} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase">Số điện thoại</label><input required type="tel" className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border border-slate-100 mt-1" value={editModal.phone} onChange={e => setEditModal({...editModal, phone: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Ngày</label><input required type="date" className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border border-slate-100 mt-1" value={editModal.date} onChange={e => setEditModal({...editModal, date: e.target.value})} /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Giờ</label><input required type="time" className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border border-slate-100 mt-1" value={editModal.time} onChange={e => setEditModal({...editModal, time: e.target.value})} /></div>
                                    </div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase">Dịch vụ (Tự nhập)</label><input required className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border border-slate-100 mt-1 text-blue-600" value={editModal.service} onChange={e => setEditModal({...editModal, service: e.target.value})} /></div>
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase">Giá Tiền (VND)</label><input required type="text" className="w-full bg-slate-50 p-3 rounded-xl text-sm font-black border border-slate-100 mt-1 text-slate-800" value={editModal.price} onChange={e => setEditModal({...editModal, price: e.target.value})} /></div>
                                </div>

                                <div className="flex gap-3 mt-6 pt-6 border-t border-slate-100">
                                    <button type="button" onClick={() => setEditModal(null)} className="flex-1 bg-slate-100 text-slate-600 py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-transform">Hủy bỏ</button>
                                    <button type="submit" className="flex-1 bg-blue-600 text-white py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-transform shadow-lg shadow-blue-200">Lưu thay đổi</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MÀN HÌNH THỐNG KÊ (ANALYTICS DASHBOARD) */}
                    {view === 'admin_stats' && (
                        <div className="animate-in space-y-4 pb-10">
                            <div className="flex justify-between items-center mb-2 px-1">
                                <h3 className="font-black uppercase tracking-[0.2em] text-xs text-slate-400">📊 BÁO CÁO KINH DOANH</h3>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className="col-span-2 bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-[2rem] text-white shadow-lg shadow-blue-200 relative overflow-hidden">
                                    <div className="relative z-10">
                                        <p className="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">
                                            {filterPeriod === 'all' ? 'Tổng Doanh Thu' : filterPeriod === 'week' ? 'Doanh Thu Tuần Này' : filterPeriod === 'month' ? 'Doanh Thu Tháng Này' : 'Doanh Thu Tháng Trước'}
                                        </p>
                                        <h2 className="text-3xl font-black tracking-tight">{formatVND(stats.totalRev)}</h2>
                                    </div>
                                    <Icon name="trending-up" size={100} className="absolute -right-4 -bottom-4 opacity-10" />
                                </div>

                                <div className="col-span-1 bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col justify-center">
                                    <div className="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-3"><Icon name="pie-chart" size={14}/></div>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Tổng Hoa Hồng</p>
                                    <p className="text-lg font-black text-emerald-600">{formatVND(stats.totalComm)}</p>
                                </div>

                                <div className="col-span-1 bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col justify-center">
                                    <div className="w-8 h-8 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mb-3"><Icon name="users" size={14}/></div>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Tổng Booking</p>
                                    <p className="text-lg font-black text-purple-600">{filteredBookings.length} <span className="text-[10px] text-slate-400 font-medium">đơn</span></p>
                                </div>
                            </div>

                            <h3 className="font-black uppercase tracking-[0.2em] text-[10px] text-slate-400 px-1 mt-6 mb-3">🔥 DỊCH VỤ HOT ({filterPeriod === 'all' ? 'TOÀN BỘ' : 'TRONG KỲ'})</h3>
                            <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                                {stats.sortedServices.map((srv, index) => (
                                    <div key={index} className="p-4 border-b border-slate-50 flex items-center justify-between last:border-0 hover:bg-slate-50 transition-colors">
                                        <div className="flex items-center gap-3">
                                            <div className="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-black text-slate-500">#{index + 1}</div>
                                            <div>
                                                <p className="font-bold text-xs text-slate-800 leading-tight">{srv.name}</p>
                                                <p className="text-[9px] font-black text-slate-400 uppercase mt-0.5">{srv.count} Lượt đặt</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-black text-xs text-blue-600">{formatVND(srv.revenue)}</p>
                                        </div>
                                    </div>
                                ))}
                                {stats.sortedServices.length === 0 && <p className="p-6 text-center text-xs text-slate-400 font-bold">Chưa có dữ liệu thống kê trong thời gian này</p>}
                            </div>
                        </div>
                    )}

                    {view !== 'success' && !isAdmin && (
                        <footer className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md flex gap-3 z-50">
                            <button type="button" onClick={() => setView('booking')} className="flex-[2.5] bg-blue-600 text-white rounded-[1.8rem] flex items-center justify-center gap-3 shadow-2xl py-4.5 font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all shadow-blue-300">
                                <Icon name="calendar" size={18} /> Đặt lịch thi công
                            </button>
                            <a href={`tel:${data.profile.phone}`} className="bg-white text-slate-900 border border-slate-200 rounded-[1.8rem] px-5 flex items-center justify-center shadow-xl active:scale-95 transition-all">
                                <Icon name="phone-call" size={20} />
                            </a>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
