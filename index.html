<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D TELLER | Chuyên gia Giải pháp Xe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .bento-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bento-item:active {
            transform: scale(0.96);
        }
        .animate-in {
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const DATA = {
            profile: {
                name: "D TELLER",
                username: "@trongtoshi7",
                title: "Solution Expert",
                bio: "11 năm kinh nghiệm dịch vụ cao cấp. Chuyên gia giải pháp xe & Content Creator.",
                avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=dteller",
                zalo: "https://zalo.me/0858888715",
                phone: "0858888715"
            },
            socials: [
                { 
                    id: 'tiktok', 
                    url: 'https://www.tiktok.com/@trongtoshi7?_r=1&_t=ZS-95LGRoZuBj6', 
                    color: 'bg-black',
                    svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.9-.39-2.82-.12-1.1.3-2.01 1.13-2.37 2.21-.19.5-.23 1.05-.12 1.57.17.95.8 1.8 1.62 2.32.7.45 1.56.66 2.39.61 1.05-.03 2.05-.51 2.73-1.29.5-.54.78-1.25.81-1.98.05-3.41-.01-6.82.01-10.23Z"/></svg>
                },
                { 
                    id: 'fb', 
                    url: 'https://www.facebook.com/share/1E2jy5hxj8/?mibextid=wwXIfr', 
                    color: 'bg-[#1877F2]',
                    svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                },
                { 
                    id: 'shopee', 
                    url: '#', 
                    color: 'bg-[#EE4D2D]',
                    svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M22.25 10.5h-1.5V9.75c0-3.31-2.69-6-6-6s-6 2.69-6 6v.75h-1.5c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zM10.25 9.75c0-2.48 2.02-4.5 4.5-4.5s4.5 2.02 4.5 4.5v.75h-9v-.75z"/></svg>
                }
            ],
            hotDeal: {
                title: "COMBO VF5 TRƯỚC MÙA DU LỊCH",
                price: "9.500.000đ",
                oldPrice: "10.300.000đ",
                gift: "TẶNG: VỆ SINH KHOANG MÁY + GIÀN NÓNG (TRỊ GIÁ 1.200.000Đ)",
                badge: "CHỈ CÒN 10 SUẤT",
                link: "https://zalo.me/0858888715"
            },
            services: [
                { id: 1, title: "Dán Phim Cách Nhiệt", icon: "shield-check", desc: "Ô tô & Nhà kính chuyên nghiệp", size: "large", color: "bg-blue-500", url: "#" },
                { id: 4, title: "Dán Phim Nhà Kính", icon: "home", desc: "Chống nóng căn hộ hướng Tây", size: "large", color: "bg-emerald-600", url: "#" },
                { id: 2, title: "Detailing", icon: "car", desc: "Dọn xe 5 Sao", size: "small", color: "bg-red-500", url: "https://vt.tiktok.com/ZSH5MQgH3/" },
                { id: 3, title: "Edit Video", icon: "play", desc: "Clip triệu view", size: "small", color: "bg-purple-500", url: "https://vt.tiktok.com/ZSH5M7j5V/" },
            ],
            pricing: {
                carSizes: [
                    { id: 'sedan', name: 'Sedan (VF5, Vios, i10...)', m: 1 },
                    { id: 'SUV', name: 'SUV (VF8, Everest...)', m: 1.25 },
                    { id: 'MPV', name: 'MPV/Bán tải (Limogreen, Ranger...)', m: 1.5 }
                ],
                items: [
                    { id: 'tint_car', name: 'Dán phim cách nhiệt (Ô tô)', type: 'car', base: 11400000 },
                    { id: 'house_std', name: 'Phim nhà kính (Tiêu chuẩn)', type: 'house', base: 350000 },
                    { id: 'house_pre', name: 'Phim nhà kính (Cao cấp)', type: 'house', base: 600000 },
                    { id: 'detail', name: 'Detailing toàn diện', type: 'car', base: 1800000 },
                    { id: 'video_edit', name: 'Edit Video (Theo source)', type: 'video', base: 500000 }
                ],
                promos: { 'DTELLER': 0.3, 'VF5MN': 0.15, }
            }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [calc, setCalc] = useState({ 
                size: 'small', 
                item: 'tint_car', 
                code: '',
                area: 1
            });
            const [discount, setDiscount] = useState(0);
            const [isPromoApplied, setIsPromoApplied] = useState(false);

            const selectedItem = useMemo(() => 
                DATA.pricing.items.find(i => i.id === calc.item), 
            [calc.item]);

            const finalPrice = useMemo(() => {
                if (!selectedItem) return 0;
                let p = 0;
                if (selectedItem.type === 'house' || selectedItem.type === 'video') {
                    p = selectedItem.base * (parseFloat(calc.area) || 0);
                } else {
                    const z = DATA.pricing.carSizes.find(i => i.id === calc.size);
                    p = selectedItem.base * (z ? z.m : 1);
                }
                return discount > 0 ? p * (1 - discount) : p;
            }, [calc, selectedItem, discount]);

            const handleApplyPromo = () => {
                const d = DATA.pricing.promos[calc.code.toUpperCase().trim()];
                if (d) {
                    setDiscount(d);
                    setIsPromoApplied(true);
                } else {
                    setDiscount(0);
                    setIsPromoApplied(false);
                }
            };

            const formatVND = (val) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(val);

            return (
                <div className="max-w-md mx-auto min-h-screen px-4 pt-8 pb-32 animate-in">
                    
                    {/* AVATAR & BIO */}
                    <header className="flex flex-col items-center mb-8 text-center">
                        <div className="relative mb-5 group">
                            <div className="absolute inset-0 bg-blue-500 blur-2xl opacity-10 rounded-full group-hover:opacity-20 transition-opacity"></div>
                            <img src={DATA.profile.avatar} className="relative w-24 h-24 rounded-[2.5rem] border-4 border-white shadow-2xl" />
                            <div className="absolute bottom-1 right-1 bg-green-500 w-5 h-5 rounded-full border-4 border-white"></div>
                        </div>
                        <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                            {DATA.profile.name}
                            <Icon name="check-circle" size={18} className="text-blue-500 fill-blue-500/10" />
                        </h1>
                        <p className="text-blue-600 font-bold text-[10px] uppercase tracking-[0.2em] mt-1 mb-4">{DATA.profile.title}</p>
                        <p className="text-slate-500 text-sm max-w-[300px] leading-relaxed font-medium italic">"{DATA.profile.bio}"</p>
                    </header>

                    {/* SOCIALS */}
                    <div className="flex justify-center gap-3.5 mb-10">
                        {DATA.socials.map(s => (
                            <a key={s.id} href={s.url} target="_blank" rel="noopener noreferrer" className={`${s.color} text-white p-3.5 rounded-[1.2rem] shadow-lg active:scale-90 transition-all`}>
                                {s.svg}
                            </a>
                        ))}
                    </div>

                    {/* BENTO GRID */}
                    <div className="grid grid-cols-2 gap-4">
                        
                        {/* 🚀 EXACT UI MATCH FOR HOT DEAL CARD */}
                        <a href={DATA.hotDeal.link} target="_blank" className="col-span-2 bg-[#1e293b] rounded-[2.5rem] p-8 text-white relative overflow-hidden bento-item border border-white/5 shadow-2xl">
                            {/* Top row */}
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
                                    <span className="text-[10px] font-black tracking-widest text-blue-400 uppercase">Flash Deal Giới Hạn</span>
                                </div>
                                <span className="bg-[#ef4444] text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-wider shadow-lg shadow-red-500/20">
                                    {DATA.hotDeal.badge}
                                </span>
                            </div>

                            <div className="relative z-10">
                                <h2 className="text-2xl font-extrabold leading-tight mb-6 w-full tracking-tight">{DATA.hotDeal.title}</h2>
                                
                                <div className="flex items-center gap-4 mb-8">
                                    <span className="text-4xl font-black">{DATA.hotDeal.price}</span>
                                    <div className="bg-red-500/20 px-2.5 py-1 rounded-md border border-red-500/10">
                                        <span className="text-xs text-[#ef4444] line-through font-bold">{DATA.hotDeal.oldPrice}</span>
                                    </div>
                                </div>

                                {/* Yellow Gift Box */}
                                <div className="bg-[#facc15] rounded-3xl p-5 flex items-center gap-4 shadow-xl shadow-yellow-400/10">
                                    <div className="bg-[#0f172a] p-2.5 rounded-xl text-[#facc15] flex-shrink-0">
                                        <Icon name="gift" size={24} />
                                    </div>
                                    <p className="text-[11px] font-extrabold text-[#0f172a] leading-snug uppercase tracking-tight">
                                        {DATA.hotDeal.gift}
                                    </p>
                                </div>
                            </div>
                            
                            {/* Decoration zap icon background */}
                            <Icon name="zap" size={180} className="absolute -right-12 -bottom-12 opacity-[0.03] text-white rotate-12" />
                        </a>

                        {/* CALCULATOR QUICK ACCESS */}
                        <button 
                            onClick={() => setView(view === 'calc' ? 'home' : 'calc')}
                            className={`col-span-2 rounded-[2.2rem] p-6 flex items-center justify-between transition-all bento-item border shadow-sm ${view === 'calc' ? 'bg-blue-600 border-blue-500 text-white shadow-blue-200' : 'bg-white border-slate-100 text-slate-900'}`}
                        >
                            <div className="flex items-center gap-4">
                                <div className={`${view === 'calc' ? 'bg-white/20' : 'bg-blue-50'} p-3.5 rounded-2xl`}>
                                    <Icon name="calculator" className={view === 'calc' ? 'text-white' : 'text-blue-600'} />
                                </div>
                                <div className="text-left">
                                    <h4 className="text-[15px] font-extrabold tracking-tight">Dự toán chi phí nhanh</h4>
                                    <p className={`text-[10px] font-bold uppercase tracking-wider ${view === 'calc' ? 'text-blue-100' : 'text-slate-400'}`}>Tự động tính theo phân khúc</p>
                                </div>
                            </div>
                            <Icon name={view === 'calc' ? 'minus' : 'chevron-down'} size={18} opacity={0.5} />
                        </button>

                        {view === 'calc' ? (
                            <div className="col-span-2 bg-white rounded-[2.5rem] p-7 shadow-2xl border border-blue-50 animate-in">
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block tracking-widest px-1">1. Chọn dịch vụ</label>
                                        <select 
                                            className="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-600 appearance-none shadow-sm" 
                                            value={calc.item}
                                            onChange={e => setCalc({...calc, item: e.target.value})}
                                        >
                                            {DATA.pricing.items.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                                        </select>
                                    </div>

                                    {selectedItem?.type === 'house' || selectedItem?.type === 'video' ? (
                                        <div className="animate-in">
                                            <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block tracking-widest px-1">
                                                {selectedItem?.type === 'house' ? '2. Nhập diện tích (m2)' : '2. Nhập số lượng Clip'}
                                            </label>
                                            <div className="relative">
                                                <input 
                                                    type="number"
                                                    min="1"
                                                    placeholder={selectedItem?.type === 'house' ? "Ví dụ: 10" : "Ví dụ: 3"}
                                                    className="w-full bg-slate-50 border-none rounded-2xl p-4 text-xl font-black outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-600 text-center shadow-inner"
                                                    value={calc.area}
                                                    onChange={e => setCalc({...calc, area: e.target.value})}
                                                />
                                                <span className="absolute right-6 top-1/2 -translate-y-1/2 font-black text-slate-300">
                                                    {selectedItem?.type === 'house' ? 'm²' : 'Clip'}
                                                </span>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="animate-in">
                                            <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block tracking-widest px-1">2. Phân khúc xe</label>
                                            <div className="grid grid-cols-1 gap-2.5">
                                                {DATA.pricing.carSizes.map(sz => (
                                                    <button 
                                                        key={sz.id} 
                                                        onClick={() => setCalc({...calc, size: sz.id})} 
                                                        className={`px-5 py-4 rounded-2xl text-[11px] font-bold border-2 transition-all ${calc.size === sz.id ? 'border-blue-600 bg-blue-50 text-blue-600 shadow-sm' : 'border-transparent bg-slate-50 text-slate-500'}`}
                                                    >
                                                        {sz.name}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <div className="flex gap-2.5">
                                            <input 
                                                placeholder="MÃ GIẢM GIÁ" 
                                                className="flex-1 bg-slate-50 rounded-2xl px-5 text-[10px] font-black uppercase outline-none border-none ring-1 ring-slate-100" 
                                                value={calc.code}
                                                onChange={e => setCalc({...calc, code: e.target.value})}
                                            />
                                            <button 
                                                onClick={handleApplyPromo}
                                                className="bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase active:scale-95 transition-transform shadow-lg shadow-black/10"
                                            >
                                                Dùng
                                            </button>
                                        </div>
                                        {isPromoApplied && <p className="text-green-600 text-[10px] font-black text-center mt-3 uppercase tracking-widest">✓ Ưu đãi {(discount*100)}% thành công</p>}
                                    </div>

                                    <div className="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-8 rounded-[2.5rem] text-center shadow-xl shadow-blue-100 relative overflow-hidden">
                                        <div className="relative z-10">
                                            <p className="text-[11px] font-black opacity-70 uppercase mb-2 tracking-[0.2em]">Giá dự toán dự kiến</p>
                                            <h3 className="text-4xl font-black mb-1 leading-tight tracking-tight">{formatVND(finalPrice)}</h3>
                                            <p className="text-[10px] opacity-60 italic font-medium">* Báo giá thực tế sau khi khảo sát</p>
                                        </div>
                                        <Icon name="calculator" size={140} className="absolute -right-8 -bottom-8 opacity-10 rotate-12" />
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <React.Fragment>
                                {DATA.services.map(s => (
                                    <a 
                                        key={s.id}
                                        href={s.url}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className={`${s.size === 'large' ? 'col-span-2' : 'col-span-1'} bg-white rounded-[2.2rem] p-6 border border-slate-100 shadow-sm flex flex-col justify-between bento-item relative group overflow-hidden min-h-[145px]`}
                                    >
                                        <div className={`${s.color} w-11 h-11 rounded-2xl flex items-center justify-center text-white mb-6 shadow-lg shadow-current/20`}>
                                            <Icon name={s.icon} size={22} />
                                        </div>
                                        <div>
                                            <h4 className="text-[13px] font-extrabold text-slate-800 leading-tight tracking-tight">{s.title}</h4>
                                            <p className="text-[9px] text-slate-400 font-bold uppercase tracking-wider mt-2">{s.desc}</p>
                                        </div>
                                        <div className="absolute right-5 bottom-5 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Icon name="arrow-up-right" size={16} className="text-slate-300" />
                                        </div>
                                    </a>
                                ))}
                            </React.Fragment>
                        )}
                    </div>

                    {/* CONTACT BAR */}
                    <footer className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md flex gap-3 z-50">
                        <a href={DATA.profile.zalo} target="_blank" rel="noopener noreferrer" className="flex-[2.5] bg-blue-600 text-white rounded-[1.8rem] flex items-center justify-center gap-3 shadow-2xl shadow-blue-300 active:scale-95 transition-all font-black text-[11px] uppercase tracking-[0.15em] py-4.5">
                            <Icon name="message-circle" size={36} /> Đặt lịch ngay
                        </a>
                        <a href={`tel:${DATA.profile.phone}`} className="bg-white text-slate-900 border border-slate-200 rounded-[1.8rem] px-5 flex items-center justify-center shadow-xl active:scale-95 transition-all">
                            <Icon name="phone-call" size={24} />
                        </a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
