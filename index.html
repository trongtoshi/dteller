<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D TELLER | Expert Hub & Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .bento-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bento-item:active { transform: scale(0.96); }
        .animate-in { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { 
            initializeApp, getFirestore, doc, setDoc, getDoc, 
            collection, onSnapshot, query, addDoc, deleteDoc,
            getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken 
        };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Firebase config safety check
        let fbConfig = {};
        try {
            fbConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "" };
        } catch (e) { console.warn("Firebase config not found or invalid"); }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dteller-hub-v1';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [data, setData] = useState(null);
            const [view, setView] = useState('home'); // home, calc, booking, admin_calendar, admin_dashboard
            const [calc, setCalc] = useState({ size: 'small', item: 'tint_car', code: '', area: 1 });
            const [discount, setDiscount] = useState(0);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [availability, setAvailability] = useState({});
            const [bookings, setBookings] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [bookingForm, setBookingForm] = useState({ name: '', phone: '', time: '09:00' });
            const [isAdmin, setIsAdmin] = useState(false);
            const [isPromoApplied, setIsPromoApplied] = useState(false);

            // 1. Init Firebase
            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FirebaseSDK || !fbConfig.apiKey) return;
                    const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseSDK;
                    const app = initializeApp(fbConfig);
                    const firestore = getFirestore(app);
                    const auth = getAuth(app);
                    setDb(firestore);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    onAuthStateChanged(auth, setUser);
                };
                initFirebase();
            }, []);

            // 2. Fetch data.json from GitHub (with Cache Busting)
            useEffect(() => {
                fetch(`data.json?t=${Date.now()}`)
                    .then(res => res.json())
                    .then(json => setData(json))
                    .catch(e => console.error("Data error", e));
            }, []);

            // 3. Listen to Real-time data
            useEffect(() => {
                if (!db || !user) return;
                const { collection, onSnapshot, query } = window.FirebaseSDK;
                
                const unsubAvail = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'availability')), (snapshot) => {
                    const dict = {};
                    snapshot.forEach(doc => dict[doc.id] = doc.data());
                    setAvailability(dict);
                });

                const unsubBook = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'bookings')), (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setBookings(list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                });

                return () => { unsubAvail(); unsubBook(); };
            }, [db, user]);

            const selectedItem = useMemo(() => data?.pricing.items.find(i => i.id === calc.item), [calc.item, data]);
            
            const finalPrice = useMemo(() => {
                if (!selectedItem || !data) return 0;
                let p = selectedItem.type === 'car' 
                    ? selectedItem.base * (data.pricing.carSizes.find(i => i.id === calc.size)?.m || 1) 
                    : selectedItem.base * (parseFloat(calc.area) || 0);
                return discount > 0 ? p * (1 - discount) : p;
            }, [calc, selectedItem, discount, data]);

            const formatVND = (val) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(val);

            const applyPromo = () => {
                const promoValue = data?.pricing.promos[calc.code.toUpperCase().trim()];
                if (promoValue) {
                    setDiscount(promoValue);
                    setIsPromoApplied(true);
                } else {
                    setDiscount(0);
                    setIsPromoApplied(false);
                }
            };

            const submitBooking = async (e) => {
                e.preventDefault();
                if (!db || !selectedDate) return;
                const { collection, addDoc } = window.FirebaseSDK;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), {
                        ...bookingForm,
                        date: selectedDate,
                        service: selectedItem?.name || 'Dịch vụ lẻ',
                        price: formatVND(finalPrice),
                        createdAt: new Date().toISOString()
                    });
                    setView('home');
                    setSelectedDate(null);
                    alert("Đặt lịch thành công! Tôi sẽ liên hệ với ông.");
                } catch (e) { alert("Lỗi gửi đơn."); }
            };

            const toggleDayStatus = async (dateStr) => {
                const current = availability[dateStr]?.status || 'empty';
                const next = current === 'empty' ? 'half' : current === 'half' ? 'full' : 'empty';
                const { doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'availability', dateStr), { status: next });
            };

            if (!data) return <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white font-black text-2xl animate-pulse italic">D TELLER...</div>;

            const renderCalendar = () => {
                const days = [];
                const now = new Date();
                const total = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                for (let i = 1; i <= total; i++) {
                    const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const st = availability[dStr]?.status || 'empty';
                    const color = st === 'full' ? 'bg-red-500 text-white' : st === 'half' ? 'bg-yellow-400 text-slate-900' : 'bg-green-500 text-white';
                    days.push(
                        <button key={i} onClick={() => isAdmin ? toggleDayStatus(dStr) : (st !== 'full' && setSelectedDate(dStr))} className={`h-14 rounded-xl flex flex-col items-center justify-center shadow-sm active:scale-90 transition-all ${color} ${selectedDate === dStr ? 'ring-4 ring-blue-600' : ''}`}>
                            <span className="text-sm font-black">{i}</span>
                            <span className="text-[7px] font-bold uppercase opacity-60 mt-1">{st==='full'?'Full':st==='half'?'Nửa':'Trống'}</span>
                        </button>
                    );
                }
                return days;
            };

            return (
                <div className="max-w-md mx-auto min-h-screen px-4 pt-8 pb-32 animate-in">
                    
                    {/* Header: Click 5 lần vào Title để mở Admin Dashboard */}
                    <header className="flex flex-col items-center mb-10 text-center">
                        <div className="relative mb-6 group">
                            <div className="absolute inset-0 bg-blue-500 blur-3xl opacity-10 rounded-full"></div>
                            <img src={data.profile.avatar} className="relative w-24 h-24 rounded-[2.5rem] border-4 border-white shadow-2xl bg-white p-2 object-cover" />
                            <div className="absolute bottom-1 right-1 bg-green-500 w-5 h-5 rounded-full border-4 border-white shadow-sm"></div>
                        </div>
                        <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                            {data.profile.name}
                            <Icon name="check-circle" size={18} className="text-blue-500 fill-blue-500/10" />
                        </h1>
                        <p onClick={() => { window._clickCount = (window._clickCount || 0) + 1; if(window._clickCount >= 5) { setIsAdmin(true); setView('admin_dashboard'); window._clickCount = 0; }}} className="text-blue-600 font-bold text-[10px] uppercase tracking-[0.2em] mt-1 select-none">
                            {isAdmin ? 'QUẢN TRỊ VIÊN' : data.profile.title}
                        </p>
                        <p className="text-slate-500 text-sm max-w-[300px] leading-relaxed font-medium italic mt-3">"{data.profile.bio}"</p>
                    </header>

                    {/* Main Nav (Admin only) */}
                    {isAdmin && (
                        <div className="flex bg-slate-200/50 p-1.5 rounded-2xl mb-8 backdrop-blur-sm">
                            <button onClick={() => setView('admin_calendar')} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black tracking-widest ${view === 'admin_calendar' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>LỊCH TRỐNG</button>
                            <button onClick={() => setView('admin_dashboard')} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black tracking-widest ${view === 'admin_dashboard' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>ĐƠN HÀNG</button>
                            <button onClick={() => {setIsAdmin(false); setView('home');}} className="px-4 text-red-500"><Icon name="log-out" size={16}/></button>
                        </div>
                    )}

                    {/* Home View */}
                    {view === 'home' && (
                        <div className="grid grid-cols-2 gap-4 animate-in">
                            {/* SOCIALS */}
                            <div className="col-span-2 flex justify-center gap-4 mb-6">
                                {data.socials.map(s => (
                                    <a key={s.id} href={s.url} target="_blank" className={`${s.color} text-white p-4 rounded-[1.3rem] shadow-xl active:scale-90 transition-all flex items-center justify-center`}>
                                        <Icon name={s.id === 'tiktok' ? 'video' : s.id === 'fb' ? 'facebook' : 'shopping-bag'} size={22} />
                                    </a>
                                ))}
                            </div>

                            {/* HOT DEAL */}
                            <a href={data.hotDeal.link} target="_blank" className="col-span-2 bg-[#1e293b] rounded-[2.5rem] p-8 text-white relative overflow-hidden bento-item border border-white/5 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
                                        <span className="text-[10px] font-black tracking-widest text-blue-400 uppercase">Flash Deal Giới Hạn</span>
                                    </div>
                                    <span className="bg-[#ef4444] text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-wider pulse-red shadow-lg shadow-red-500/20">{data.hotDeal.badge}</span>
                                </div>
                                <h2 className="text-2xl font-extrabold leading-tight mb-6 tracking-tight uppercase">{data.hotDeal.title}</h2>
                                <div className="flex items-center gap-4 mb-8">
                                    <span className="text-4xl font-black">{data.hotDeal.price}</span>
                                    <div className="bg-red-500/20 px-2.5 py-1 rounded-md text-center flex items-center">
                                        <span className="text-xs text-[#ef4444] line-through font-bold">{data.hotDeal.oldPrice}</span>
                                    </div>
                                </div>
                                <div className="bg-[#facc15] rounded-3xl p-5 flex items-center gap-4 shadow-xl">
                                    <div className="bg-[#0f172a] p-2.5 rounded-xl text-[#facc15] flex-shrink-0"><Icon name="gift" size={24} /></div>
                                    <p className="text-[11px] font-extrabold text-[#0f172a] leading-snug uppercase tracking-tight">{data.hotDeal.gift}</p>
                                </div>
                                <Icon name="zap" size={180} className="absolute -right-12 -bottom-12 opacity-[0.03] text-white rotate-12" />
                            </a>

                            {/* CALCULATOR TOGGLE (Vừa được khôi phục) */}
                            <button onClick={() => setView('calc')} className="col-span-2 rounded-[2.2rem] bg-white p-6 flex items-center justify-between border border-slate-100 shadow-sm bento-item">
                                <div className="flex items-center gap-4">
                                    <div className="bg-blue-50 p-3.5 rounded-2xl text-blue-600"><Icon name="calculator" /></div>
                                    <div className="text-left">
                                        <h4 className="text-[15px] font-extrabold tracking-tight">Dự toán chi phí nhanh</h4>
                                        <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400">Tự động tính theo phân khúc</p>
                                    </div>
                                </div>
                                <Icon name="chevron-right" size={18} opacity={0.5} />
                            </button>

                            {/* SERVICES GRID */}
                            {data.services.map(s => (
                                <a key={s.id} href={s.url} target="_blank" className={`${s.size === 'large' ? 'col-span-2' : 'col-span-1'} bg-white rounded-[2.2rem] p-6 border border-slate-100 shadow-sm flex flex-col justify-between bento-item min-h-[145px]`}>
                                    <div className={`${s.color} w-11 h-11 rounded-2xl flex items-center justify-center text-white mb-6 shadow-lg`}><Icon name={s.icon} size={22} /></div>
                                    <h4 className="text-[13px] font-extrabold leading-tight tracking-tight">{s.title}</h4>
                                </a>
                            ))}
                        </div>
                    )}

                    {/* Booking View */}
                    {(view === 'booking' || view === 'admin_calendar') && (
                        <div className="animate-in space-y-6">
                            <div className="bg-white rounded-[2.5rem] p-6 shadow-2xl border border-slate-50">
                                <div className="flex justify-between items-center mb-6 px-1">
                                    <h3 className="font-black uppercase tracking-[0.2em] text-xs text-slate-400">{isAdmin ? '⚙️ Quản lý trạng thái lịch' : '📅 Chọn ngày thi công'}</h3>
                                    <button onClick={() => setView('home')} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={16}/></button>
                                </div>
                                <div className="calendar-grid mb-8">{renderCalendar()}</div>
                                {selectedDate && !isAdmin && (
                                    <form onSubmit={submitBooking} className="space-y-4 pt-8 border-t border-slate-100 animate-in">
                                        <div className="text-center mb-6"><span className="bg-blue-50 text-blue-600 px-4 py-2 rounded-full font-black text-xs uppercase tracking-widest leading-none">NGÀY HẸN: {selectedDate}</span></div>
                                        <input required placeholder="Họ và tên của ông" className="w-full bg-slate-50 p-4.5 rounded-2xl text-sm font-bold outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500" value={bookingForm.name} onChange={e => setBookingForm({...bookingForm, name: e.target.value})} />
                                        <input required type="tel" placeholder="Số điện thoại liên hệ" className="w-full bg-slate-50 p-4.5 rounded-2xl text-sm font-bold outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500" value={bookingForm.phone} onChange={e => setBookingForm({...bookingForm, phone: e.target.value})} />
                                        <div className="flex gap-2">
                                            <input type="time" className="flex-1 bg-slate-50 p-4.5 rounded-2xl text-sm font-bold ring-1 ring-slate-100" value={bookingForm.time} onChange={e => setBookingForm({...bookingForm, time: e.target.value})} />
                                            <button type="submit" className="flex-[2] bg-blue-600 text-white font-black rounded-2xl uppercase text-[10px] tracking-widest shadow-xl shadow-blue-200">Xác nhận lịch</button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Calculator View (Bổ sung phần khuyến mãi) */}
                    {view === 'calc' && (
                        <div className="bg-white rounded-[2.5rem] p-7 shadow-2xl animate-in space-y-6">
                            <div className="flex justify-between items-center mb-2"><h3 className="font-black uppercase tracking-widest text-xs">Dự toán & Ưu đãi</h3><button onClick={() => setView('home')} className="p-2"><Icon name="x"/></button></div>
                            <select className="w-full bg-slate-50 p-4.5 rounded-2xl font-bold outline-none ring-1 ring-slate-100" value={calc.item} onChange={e => setCalc({...calc, item: e.target.value})}>
                                {data.pricing.items.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                            </select>
                            {selectedItem?.type === 'car' ? (
                                <div className="grid grid-cols-1 gap-2.5">
                                    {data.pricing.carSizes.map(sz => (
                                        <button key={sz.id} onClick={() => setCalc({...calc, size: sz.id})} className={`p-4 rounded-2xl text-[11px] font-black border-2 transition-all ${calc.size === sz.id ? 'border-blue-600 bg-blue-50 text-blue-600 shadow-sm' : 'border-transparent bg-slate-50 text-slate-400'}`}>{sz.name}</button>
                                    ))}
                                </div>
                            ) : (
                                <div className="relative"><input type="number" className="w-full bg-slate-50 p-4.5 rounded-2xl text-xl font-black text-center ring-1 ring-slate-100 outline-none" value={calc.area} onChange={e => setCalc({...calc, area: e.target.value})} /><span className="absolute right-6 top-1/2 -translate-y-1/2 font-black text-slate-300 uppercase text-[10px] tracking-widest">{selectedItem?.type === 'house' ? 'm²' : 'Clip'}</span></div>
                            )}

                            {/* KHU VỰC NHẬP MÃ KHUYẾN MÃI (Vừa được khôi phục) */}
                            <div>
                                <div className="flex gap-2.5">
                                    <input placeholder="MÃ GIẢM GIÁ" className="flex-1 bg-slate-50 rounded-2xl px-5 text-[10px] font-black uppercase outline-none ring-1 ring-slate-100" value={calc.code} onChange={e => { setCalc({...calc, code: e.target.value}); if (discount > 0) setDiscount(0); }} />
                                    <button onClick={applyPromo} className="bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-black/10 active:scale-95 transition-transform">Dùng</button>
                                </div>
                                {isPromoApplied && <p className="text-green-600 text-[10px] font-black text-center mt-3 uppercase tracking-widest flex items-center justify-center gap-1 animate-in"><Icon name="check" size={12} /> Áp dụng mã thành công (Giảm {discount*100}%)</p>}
                            </div>

                            <div className="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-8 rounded-[2.5rem] text-center shadow-xl shadow-blue-100 relative overflow-hidden">
                                <div className="relative z-10">
                                    <p className="text-[11px] font-black opacity-70 uppercase mb-2 tracking-[0.2em]">Giá dự toán dự kiến</p>
                                    <h3 className="text-4xl font-black mb-6 leading-tight tracking-tight">{formatVND(finalPrice)}</h3>
                                    <button onClick={() => setView('booking')} className="w-full bg-white text-blue-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Đặt lịch ngay</button>
                                </div>
                                <Icon name="calculator" size={140} className="absolute -right-8 -bottom-8 opacity-10 rotate-12" />
                            </div>
                        </div>
                    )}

                    {/* Admin Orders Dashboard */}
                    {view === 'admin_dashboard' && (
                        <div className="animate-in space-y-4">
                            <div className="flex justify-between items-center mb-6 px-1">
                                <h3 className="font-black uppercase tracking-[0.2em] text-xs">📦 ĐƠN HÀNG MỚI ({bookings.length})</h3>
                                <button onClick={() => setView('home')} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={16}/></button>
                            </div>
                            {bookings.map(b => (
                                <div key={b.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden animate-in">
                                    <div className="flex justify-between items-start mb-4">
                                        <div><h4 className="text-lg font-black tracking-tight leading-none mb-1">{b.name}</h4><p className="text-blue-600 font-bold text-xs uppercase tracking-widest">{b.phone}</p></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        <div className="bg-slate-50 p-3 rounded-2xl"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Thời gian</p><p className="text-[11px] font-bold">{b.date} • {b.time}</p></div>
                                        <div className="bg-slate-50 p-3 rounded-2xl"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Dự toán</p><p className="text-[11px] font-bold text-blue-600">{b.price}</p></div>
                                    </div>
                                    <div className="bg-blue-50 p-3.5 rounded-2xl font-black text-[11px] leading-tight">{b.service}</div>
                                    <div className="absolute top-0 right-0 h-full w-1.5 bg-blue-500"></div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Footer Contact */}
                    <footer className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md flex gap-3 z-50">
                        <button onClick={() => setView('booking')} className="flex-[2.5] bg-blue-600 text-white rounded-[1.8rem] flex items-center justify-center gap-3 shadow-2xl py-4.5 font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all shadow-blue-300">
                            <Icon name="calendar" size={18} /> Đặt lịch thi công
                        </button>
                        <a href={`tel:${data.profile.phone}`} className="bg-white text-slate-900 border border-slate-200 rounded-[1.8rem] px-5 flex items-center justify-center shadow-xl active:scale-95 transition-all">
                            <Icon name="phone-call" size={20} />
                        </a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
